services:
  # Jupyter Lab - AI Development Environment (Multi-platform)
  jupyter:
    image: bozzza/bruteforcegroup:ai-jupyter-latest
    build: 
      context: ./jupyter
      dockerfile: Dockerfile.simple
      platforms:
        - linux/arm64
        - linux/amd64
      cache_from:
        - type=registry,ref=bozzza/bruteforcegroup:cache
      cache_to:
        - type=registry,ref=bozzza/bruteforcegroup:cache,mode=max
      x-bake:
        platforms: ["linux/arm64", "linux/amd64"]
        cache-from: ["type=registry,ref=bozzza/bruteforcegroup:cache"]
        cache-to: ["type=registry,ref=bozzza/bruteforcegroup:cache,mode=max"]
    container_name: ai-jupyter
    ports:
      - "8889:8888"
    volumes:
      - ./data:/home/jovyan/workspace/data
      - ./models:/home/jovyan/workspace/models
      - ./jupyter/notebooks:/home/jovyan/workspace/notebooks
      - ./projects:/home/jovyan/workspace/projects
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=ai-dev-token
    networks:
      - ai-network
    restart: unless-stopped

  # FastAPI Model Serving (Multi-platform)
  api-server:
    image: bozzza/bruteforcegroup:ai-api-server-latest
    build: 
      context: ./api
      platforms:
        - linux/arm64
        - linux/amd64
      cache_from:
        - type=registry,ref=bozzza/bruteforcegroup:cache
      cache_to:
        - type=registry,ref=bozzza/bruteforcegroup:cache,mode=max
    container_name: ai-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./api:/app
    environment:
      - PYTHONPATH=/app
    networks:
      - ai-network
    depends_on:
      - chroma
    restart: unless-stopped

  # ChromaDB Vector Database
  chroma:
    image: chromadb/chroma:latest
    container_name: ai-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    networks:
      - ai-network
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: ai-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-network
    restart: unless-stopped

  # MLflow for experiment tracking (Multi-platform)
  mlflow:
    image: bozzza/bruteforcegroup:ai-mlflow-latest
    build:
      context: ./config/mlflow
      platforms:
        - linux/arm64
        - linux/amd64
      cache_from:
        - type=registry,ref=bozzza/bruteforcegroup:cache
      cache_to:
        - type=registry,ref=bozzza/bruteforcegroup:cache,mode=max
    container_name: ai-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    networks:
      - ai-network
    restart: unless-stopped

  # Streamlit for quick prototyping (Multi-platform)
  streamlit:
    image: bozzza/bruteforcegroup:ai-streamlit-latest
    build:
      context: ./config/streamlit
      platforms:
        - linux/arm64
        - linux/amd64
      cache_from:
        - type=registry,ref=bozzza/bruteforcegroup:cache
      cache_to:
        - type=registry,ref=bozzza/bruteforcegroup:cache,mode=max
    container_name: ai-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./config/streamlit/apps:/app
    networks:
      - ai-network
    restart: unless-stopped

networks:
  ai-network:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.20.0.0/16
        - subnet: 2001:db8::/32

volumes:
  chroma_data:
  redis_data:
  mlflow_data:

# Docker Bake configuration for Build Cloud
x-bake:
  default:
    platforms: ["linux/arm64", "linux/amd64"]
    cache-from: ["type=registry,ref=bozzza/bruteforcegroup:cache"]
    cache-to: ["type=registry,ref=bozzza/bruteforcegroup:cache,mode=max"]

